[profile/DocumentedDefaults]
activate = yes
paths = ${var:KNOWNFOLDER_PROFILE}\**

include_hidden = no
include_dirs = no
max_depth = 5
filters =
    - ext: .png .py .tmp .tmTheme .lexres .sublime-syntax .md .php .jpg .pdf .xml .msg .eml .key .reg .ps1 .bat
    - LICENSE
    - Desktop
    - *\Sublime\*
